<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Times Up!</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>

  <!-- Setup -->
  <div id="setup-screen" class="screen active">
    <div class="setup-inner">
      <header class="setup-header">
        <h1 class="app-title">Times Up!</h1>
        <p class="app-subtitle">Párty hra s kartami</p>
        <button type="button" id="show-all-cards-btn" class="btn-all-cards">
          Všechny karty
        </button>
      </header>

      <div class="setup-panel">
        <div class="setting-group">
          <label for="card-count" class="form-label">Počet karet</label>
          <div class="range-row">
            <input type="range" class="form-range" id="card-count-range" min="10" max="50" value="30">
            <input type="number" class="form-control count-input" id="card-count" min="10" max="50" value="30">
          </div>
        </div>

        <div class="setting-group">
          <label for="timer-limit" class="form-label">Časový limit (sekundy)</label>
          <div class="range-row">
            <input type="range" class="form-range" id="timer-range" min="15" max="180" value="60">
            <input type="number" class="form-control count-input" id="timer-limit" min="15" max="180" value="60">
          </div>
        </div>

        <div class="setting-group">
          <label for="difficulty-range" class="form-label">Obtížnost</label>
          <div class="difficulty-row">
            <input type="range" class="form-range" id="difficulty-range" min="0" max="3" step="1" value="0">
            <span class="difficulty-value" id="difficulty-value">0</span>
          </div>
          <p class="setting-hint" id="difficulty-hint">Náhodný výběr karet</p>
        </div>

        <div class="setup-divider"></div>

        <label class="titio-card" for="titio-edition" id="titio-card">
          <input type="checkbox" class="titio-input" id="titio-edition">
          <span class="titio-copy">
            <span class="titio-title">Titio edice</span>
          </span>
          <span class="titio-switch" aria-hidden="true">
            <span class="titio-switch-knob"></span>
          </span>
        </label>
      </div>

      <button id="start-btn" class="btn btn-primary btn-lg w-100 start-btn">Začít hru</button>
    </div>
  </div>

  <!-- Game -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <div class="round-badge" id="round-badge">Kolo 1</div>
      <div class="timer-display" id="timer-display">60</div>
      <div class="cards-remaining" id="cards-remaining"></div>
    </div>

    <div class="timer-bar-track">
      <div class="timer-bar-fill" id="timer-bar-fill"></div>
    </div>

    <div class="game-area" id="game-area">
      <div id="action-flash" class="action-flash" hidden></div>

      <!-- Tap overlays -->
      <div class="overlay-message tap-overlay" id="tap-overlay">
        <div class="overlay-icon">👆</div>
        <p id="tap-message">Klepněte pro start</p>
      </div>

      <div class="overlay-message timeup-overlay" id="timeup-overlay" hidden>
        <div class="overlay-icon pulse">⏰</div>
        <p>Čas vypršel!</p>
      </div>

      <div class="overlay-message round-overlay" id="round-overlay" hidden>
        <div class="overlay-icon">🎉</div>
        <p id="round-message"></p>
        <p class="tap-hint">Klepněte pro pokračování</p>
      </div>

      <div class="overlay-message gameover-overlay" id="gameover-overlay" hidden>
        <div class="overlay-icon">🏆</div>
        <p>Hra skončila!</p>
        <p class="tap-hint">Klepněte pro novou hru</p>
      </div>

      <!-- Card play area -->
      <div class="play-zone" id="play-zone" hidden>
        <button class="btn btn-success action-btn" id="btn-guessed">Uhodnuto</button>

        <div class="card-stack" id="card-stack">
          <div class="game-card" id="current-card">
            <span class="card-text" id="card-text"></span>
          </div>
        </div>

        <button class="btn btn-danger action-btn" id="btn-skip">Odsunout</button>
      </div>
    </div>
  </div>

  <!-- All cards catalog -->
  <div id="cards-modal" class="cards-modal" hidden aria-hidden="true">
    <div class="cards-modal-panel">
      <header class="cards-modal-header">
        <div class="cards-modal-search-wrap">
          <span class="cards-search-icon" aria-hidden="true">🔍</span>
          <input type="search" id="cards-search" class="cards-search" placeholder="Hledat kartu…" autocomplete="off" enterkeyhint="search">
        </div>
        <button type="button" id="cards-modal-close" class="cards-modal-close" aria-label="Zavřít">×</button>
      </header>
      <p class="cards-modal-count" id="cards-count-label"></p>
      <div class="cards-list-wrap">
        <div class="cards-list" id="cards-list"></div>
        <p class="cards-no-results" id="cards-no-results" hidden>Žádná karta nenalezena</p>
      </div>
    </div>
  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
